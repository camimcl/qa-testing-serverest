[pytest]
; Registra os marks customizados usados nos testes (evita PytestUnknownMarkWarning)
markers =
    get: Testes do endpoint GET /usuarios
    post: Testes do endpoint POST /usuarios
    put: Testes do endpoint PUT /usuarios
    delete: Testes do endpoint DELETE /usuarios

; Retry automatico para lidar com o reset periodico da API publica ServeRest.
; A instancia compassuol.serverest.dev reinicia periodicamente (~60s),
; o que causa falhas intermitentes com latencia de ~9s seguida de status 400.
; Com retries=2, cada teste tem ate 3 tentativas antes de ser marcado como FAILED.
retries = 2
retry_delay = 1
